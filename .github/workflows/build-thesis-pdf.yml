name: Build Thesis PDF

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Thesis/thesis_main.tex
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: Thesis/thesis_main.pdf
